<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeiStudio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f7f9fb;
      color: #172033;
    }

    main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
    }

    h1 {
      margin-bottom: 12px;
      font-size: 64px;
      letter-spacing: -2px;
    }

    h2 {
      margin-bottom: 28px;
      font-size: 25px;
      font-weight: 400;
      color: #3d5a73;
    }

    p {
      font-size: 18px;
      line-height: 1.7;
      color: #586579;
    }

    .university {
      margin-top: 36px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #214f70;
    }
  </style>
</head>

<body>
  <main>
    <div class="container">
      <h1>SeiStudio</h1>
      <h2>Seismic Imaging &amp; Sensing Laboratory</h2>

      <p>
        We develop advanced seismic processing, imaging, and sensing
        technologies to understand complex subsurface systems from land
        to ocean.
      </p>

      <div class="university">
        KANGWON NATIONAL UNIVERSITY
      </div>
    </div>
  </main>
</body>
</html>
